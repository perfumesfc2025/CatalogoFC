<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extracto Importado · FC Perfumes</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ink:#1a1612;--cream:#faf7f1;--gold:#b8965a;--gold-pale:#f5ecd9;--muted:#9a9080;--border:#e4dcd0;--wa:#25d366}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--cream);color:var(--ink);font-size:13px;line-height:1.5}
.hdr{background:var(--ink);color:var(--cream);padding:18px 24px;text-align:center}
.hdr h1{font-family:Georgia,serif;font-size:18px;letter-spacing:.3em;font-weight:300}
.fbar{background:white;border-bottom:1px solid var(--border);padding:14px 20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;position:sticky;top:0;z-index:100;box-shadow:0 2px 14px rgba(15,13,11,.05)}
.fbar input,.fbar select{padding:9px 12px;border:1px solid var(--border);border-radius:2px;font-size:12px;background:var(--cream);color:var(--ink)}
.fbar input{flex:1;min-width:180px}
.gmeta{padding:18px 22px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:white}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(238px,1fr));gap:1px;background:var(--border)}
.pcard{background:white;padding:18px;cursor:pointer;transition:background .2s;display:flex;flex-direction:column;align-items:center;text-align:center}
.pcard:hover{background:var(--gold-pale)}
.pcard img{width:100%;max-width:180px;height:220px;object-fit:contain;border-radius:2px}
.pcard .num{font-family:Georgia,serif;font-size:16px;letter-spacing:.15em;margin:12px 0 6px;color:var(--ink)}
.pcard .cat{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.ctag{font-size:9px;letter-spacing:.09em;text-transform:uppercase;padding:3px 8px;border-radius:1px;border:1px solid;display:inline-block;margin-top:4px}
.ctag.stok{border-color:rgba(46,102,69,.25);background:#edf7f0;color:#1e5a35}
.ctag.slow{border-color:rgba(180,120,0,.25);background:#fdf6e3;color:#7a5500}
.ctag.sno{border-color:var(--border);background:#f5f3f0;color:#b0a090}
.ov{position:fixed;inset:0;background:rgba(15,13,11,.6);display:none;align-items:flex-end;justify-content:center;z-index:1000}
.ov.open{display:flex}
.pm{background:white;width:100%;max-width:560px;max-height:92vh;border-radius:10px 10px 0 0;overflow-y:auto;padding:24px;position:relative}
.pm-x{position:absolute;top:13px;right:13px;width:32px;height:32px;background:rgba(15,13,11,.07);border:none;border-radius:50%;cursor:pointer;font-size:15px}
.pm img{width:100%;max-width:240px;display:block;margin:0 auto 16px}
.pm-num{font-family:Georgia,serif;font-size:22px;letter-spacing:.15em;text-align:center;margin-bottom:6px}
.pm-cat{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:14px}
.pm-fam{font-size:11px;color:var(--gold);text-align:center;margin-bottom:16px;font-style:italic}
.pm-notas{background:var(--gold-pale);padding:14px;border-radius:4px;margin-bottom:16px;font-size:11px}
.pm-notas div{margin-bottom:6px}
.pm-notas b{color:#6e5020;letter-spacing:.05em}
.pres-sel{display:flex;gap:8px;margin:16px 0}
.pres-btn{flex:1;padding:12px 8px;border:2px solid var(--border);background:white;cursor:pointer;border-radius:3px;text-align:center;font-size:11px;transition:all .2s}
.pres-btn.active{border-color:var(--gold);background:var(--gold-pale)}
.pres-btn.disabled{opacity:.4;cursor:not-allowed;text-decoration:line-through}
.pres-btn .ml{font-weight:bold;font-size:13px}
.pres-btn .pr{display:block;margin-top:4px;color:var(--gold)}
.add-btn{width:100%;background:var(--ink);color:white;border:none;padding:14px;font-size:11px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;border-radius:2px;margin-top:8px}
.add-btn:disabled{background:#999;cursor:not-allowed}
.cart-fab{position:fixed;bottom:20px;right:20px;background:var(--wa);color:white;border:none;width:60px;height:60px;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:500;display:flex;align-items:center;justify-content:center}
.cart-fab .badge{position:absolute;top:-4px;right:-4px;background:var(--ink);color:white;border-radius:50%;width:22px;height:22px;font-size:11px;display:flex;align-items:center;justify-content:center}
.cart-ov{position:fixed;inset:0;background:rgba(15,13,11,.6);display:none;align-items:flex-end;justify-content:center;z-index:1100}
.cart-ov.open{display:flex}
.cart-pm{background:white;width:100%;max-width:560px;max-height:90vh;border-radius:10px 10px 0 0;display:flex;flex-direction:column}
.cart-hdr{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-body{flex:1;overflow-y:auto;padding:14px 22px}
.cart-item{padding:12px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-item .info{flex:1}
.cart-item .nm{font-family:Georgia,serif;font-size:14px}
.cart-item .det{font-size:11px;color:var(--muted);margin-top:2px}
.cart-item .pr{font-weight:bold;margin:0 12px}
.cart-item button{background:#f5f3f0;border:1px solid var(--border);width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px}
.cart-foot{padding:18px 22px;border-top:1px solid var(--border);background:var(--cream)}
.cart-tot{display:flex;justify-content:space-between;font-size:16px;font-weight:bold;margin-bottom:14px}
.cart-wa{display:block;width:100%;background:var(--wa);color:white;text-align:center;padding:14px;text-decoration:none;border-radius:3px;font-size:11px;letter-spacing:.2em;text-transform:uppercase}
.loading{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>
<div class="hdr"><h1>EXTRACTO IMPORTADO</h1></div>
<div class="fbar">
  <input id="search" type="text" placeholder="Buscar por número o equivalencia (ej: sauvage, 73)">
  <select id="filterCat"><option value="">Todas las categorías</option><option>Femenino</option><option>Masculino</option><option>Unisex</option></select>
  <select id="filterStock"><option value="">Todo el stock</option><option value="ok">Disponible</option><option value="low">Últimas unidades</option></select>
</div>
<div class="gmeta"><span id="count">Cargando...</span></div>
<div id="grid" class="products-grid"><div class="loading">Cargando catálogo...</div></div>

<div class="ov" id="pmov"><div class="pm" id="pmbox"></div></div>
<div class="cart-ov" id="cartov"><div class="cart-pm" id="cartbox"></div></div>
<button class="cart-fab" id="cartfab" onclick="openCart()">🛒<span class="badge" id="cartbadge">0</span></button>

<script>
// ========================================
// CONFIGURACIÓN — PEGAR ACÁ LA URL DEL SHEET
// ========================================
var SHEET_BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vStjWhBT2OU8Hrf-y3xXnjSBUZjn_wwoImCmwmD4CJ8OSy3_LagA6pDxqgt5VPBAQ/pub?output=csv';
// Ejemplo: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vXXXXXXXXXXXXXX/pub'
// Después agregás los parámetros: ?gid=NNNN&single=true&output=csv para cada hoja
var GID_CONFIG = '0';
var GID_EXTRACTOS = '1640894856';
// Reemplazar GID_EXTRACTOS por el GID real de la pestaña EXTRACTOS

var WA = '541140550053';
var CFG = {ext30:20000, ext50:30000, ext100:50000};
var DB = [];
var CART = [];

function fmt(n){return '$'+Number(n).toLocaleString('es-AR')}
function escH(t){var d=document.createElement('div');d.textContent=String(t||'');return d.innerHTML}
function norm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}

// Parser CSV simple
function parseCSV(txt){
  var lines = txt.trim().split(/\r?\n/);
  var heads = lines[0].split(',').map(function(h){return h.trim()});
  return lines.slice(1).map(function(line){
    var vals = [];
    var cur = '', inQ = false;
    for(var i=0;i<line.length;i++){
      var c = line[i];
      if(c === '"'){inQ = !inQ; continue}
      if(c === ',' && !inQ){vals.push(cur); cur = ''; continue}
      cur += c;
    }
    vals.push(cur);
    var obj = {};
    heads.forEach(function(h,i){obj[h] = (vals[i]||'').trim()});
    return obj;
  });
}

// Carga desde Google Sheets
function loadSheet(gid){
  var url = SHEET_BASE + '?gid=' + gid + '&single=true&output=csv';
  return fetch(url).then(function(r){return r.text()}).then(parseCSV);
}

function loadAll(){
  Promise.all([loadSheet(GID_CONFIG), loadSheet(GID_EXTRACTOS)])
    .then(function(results){
      var cfg = results[0];
      cfg.forEach(function(row){
        if(row.clave === 'precio_ext_30') CFG.ext30 = +row.valor;
        if(row.clave === 'precio_ext_50') CFG.ext50 = +row.valor;
        if(row.clave === 'precio_ext_100') CFG.ext100 = +row.valor;
        if(row.clave === 'whatsapp') WA = row.valor;
      });
      DB = results[1].filter(function(r){return r.activo === 'si'});
      render();
    })
    .catch(function(e){
      document.getElementById('grid').innerHTML = '<div class="loading">Error cargando catálogo. Revisá la URL del Sheet.<br><small>'+e.message+'</small></div>';
    });
}

function stTag(p){
  if(p.s30==='ok'||p.s50==='ok'||p.s100==='ok') return '<span class="ctag stok">Disponible</span>';
  if(p.s30==='low'||p.s50==='low'||p.s100==='low') return '<span class="ctag slow">Últimas unidades</span>';
  return '<span class="ctag sno">Sin stock</span>';
}
function stockOf(p){
  if(p.s30==='ok'||p.s50==='ok'||p.s100==='ok') return 'ok';
  if(p.s30==='low'||p.s50==='low'||p.s100==='low') return 'low';
  return 'no';
}

function render(){
  var q = norm(document.getElementById('search').value);
  var fc = document.getElementById('filterCat').value;
  var fs = document.getElementById('filterStock').value;
  var filtered = DB.filter(function(p){
    if(fc && p.cat !== fc) return false;
    if(fs && stockOf(p) !== fs) return false;
    if(q){
      var hay = norm(p.numero+' '+p.equivalencia+' '+p.familia);
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  });
  filtered.sort(function(a,b){return (+a.numero) - (+b.numero)});
  document.getElementById('count').textContent = filtered.length + ' productos';
  var html = filtered.map(function(p){
    return '<div class="pcard" onclick="openProduct('+p.numero+')">'+
      '<img src="img/ei-n'+p.numero+'.png" alt="N°'+p.numero+'" onerror="this.style.opacity=0.2">'+
      '<div class="num">N° '+p.numero+'</div>'+
      '<div class="cat">'+escH(p.cat)+'</div>'+
      stTag(p)+'</div>';
  }).join('');
  document.getElementById('grid').innerHTML = html || '<div class="loading">Sin resultados</div>';
}

function openProduct(num){
  var p = DB.find(function(x){return +x.numero === +num});
  if(!p) return;
  var precios = {s30:CFG.ext30, s50:CFG.ext50, s100:CFG.ext100};
  var mls = [{k:'s30',ml:30},{k:'s50',ml:50},{k:'s100',ml:100}];
  var btns = mls.map(function(m){
    var dis = p[m.k] === 'no';
    return '<button class="pres-btn '+(dis?'disabled':'')+'" data-ml="'+m.ml+'" data-pr="'+precios[m.k]+'" '+(dis?'disabled':'onclick="selectPres(this)"')+'>'+
      '<span class="ml">'+m.ml+'ml</span><span class="pr">'+fmt(precios[m.k])+'</span></button>';
  }).join('');
  document.getElementById('pmbox').innerHTML =
    '<button class="pm-x" onclick="closePM()">✕</button>'+
    '<img src="img/ei-n'+p.numero+'.png" alt="N°'+p.numero+'" onerror="this.style.display=\'none\'">'+
    '<div class="pm-num">N° '+p.numero+'</div>'+
    '<div class="pm-cat">'+escH(p.cat)+'</div>'+
    '<div class="pm-fam">'+escH(p.familia)+'</div>'+
    '<div class="pm-notas">'+
      '<div><b>SALIDA:</b> '+escH(p.notas_salida)+'</div>'+
      '<div><b>CORAZÓN:</b> '+escH(p.notas_corazon)+'</div>'+
      '<div><b>FONDO:</b> '+escH(p.notas_fondo)+'</div>'+
    '</div>'+
    '<div class="pres-sel">'+btns+'</div>'+
    '<button class="add-btn" id="addbtn" onclick="addCart('+p.numero+')" disabled>Seleccioná una presentación</button>';
  document.getElementById('pmov').classList.add('open');
}
function selectPres(btn){
  document.querySelectorAll('.pres-btn').forEach(function(b){b.classList.remove('active')});
  btn.classList.add('active');
  var ab = document.getElementById('addbtn');
  ab.disabled = false;
  ab.textContent = 'Agregar al carrito · '+fmt(btn.dataset.pr);
}
function addCart(num){
  var sel = document.querySelector('.pres-btn.active');
  if(!sel) return;
  var p = DB.find(function(x){return +x.numero === +num});
  CART.push({num:num,equiv:p.equivalencia,ml:+sel.dataset.ml,pr:+sel.dataset.pr,qty:1});
  updateBadge();
  closePM();
}
function updateBadge(){
  document.getElementById('cartbadge').textContent = CART.reduce(function(s,i){return s+i.qty},0);
}
function closePM(){document.getElementById('pmov').classList.remove('open')}
function openCart(){
  if(!CART.length){alert('Tu carrito está vacío');return}
  var rows = CART.map(function(it,i){
    return '<div class="cart-item"><div class="info"><div class="nm">N° '+it.num+'</div><div class="det">'+it.ml+'ml · '+escH(it.equiv)+'</div></div>'+
      '<div class="pr">'+fmt(it.pr*it.qty)+'</div>'+
      '<button onclick="rmCart('+i+')">✕</button></div>';
  }).join('');
  var tot = CART.reduce(function(s,i){return s+i.pr*i.qty},0);
  var msg = '*PEDIDO FC PERFUMES*%0A%0A' + CART.map(function(it){
    return '• N°'+it.num+' ('+it.equiv+') '+it.ml+'ml — '+fmt(it.pr);
  }).join('%0A') + '%0A%0A*TOTAL: '+fmt(tot)+'*';
  var waUrl = 'https://wa.me/'+WA+'?text='+msg;
  document.getElementById('cartbox').innerHTML =
    '<div class="cart-hdr"><b>Tu carrito</b><button onclick="closeCart()" style="background:none;border:none;font-size:18px;cursor:pointer">✕</button></div>'+
    '<div class="cart-body">'+rows+'</div>'+
    '<div class="cart-foot"><div class="cart-tot"><span>TOTAL</span><span>'+fmt(tot)+'</span></div>'+
    '<a class="cart-wa" href="'+waUrl+'" target="_blank">Enviar pedido por WhatsApp</a></div>';
  document.getElementById('cartov').classList.add('open');
}
function rmCart(i){CART.splice(i,1);updateBadge();openCart()}
function closeCart(){document.getElementById('cartov').classList.remove('open')}

document.getElementById('search').addEventListener('input',render);
document.getElementById('filterCat').addEventListener('change',render);
document.getElementById('filterStock').addEventListener('change',render);
document.getElementById('pmov').addEventListener('click',function(e){if(e.target===this)closePM()});
document.getElementById('cartov').addEventListener('click',function(e){if(e.target===this)closeCart()});

loadAll();
</script>
</body>
</html>
