<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Catálogo de perfumes importados. Las mejores marcas al mejor precio en Argentina.">
    <meta name="keywords" content="perfumes, fragancias, catálogo, Argentina">
    <meta property="og:title" content="PerfumesFC - Catálogo 2025">
    <meta property="og:description" content="Descubrí nuestra colección de perfumes de las mejores marcas">
    <title>Catálogo de Perfumes - PerfumesFC</title>
    <style>
        /* --- ESTILOS OPTIMIZADOS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2c3e50;
            --accent: #f39c12;
            --success: #27ae60;
            --light: #f8f9fa;
            --danger: #e74c3c;
            --whatsapp: #25D366;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        header { 
            background: #1a252f; 
            color: white; 
            padding: 25px; 
            text-align: center; 
        }
        header h1 { font-size: 2em; margin-bottom: 5px; }
        header p { font-size: 0.9em; opacity: 0.8; }
        
        .filters {
            background: #f1f1f1;
            padding: 15px 25px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            border-bottom: 3px solid var(--accent);
            align-items: center;
        }
        .search-box { flex: 1; min-width: 200px; }
        .search-box input {
            width: 100%; 
            padding: 12px 15px; 
            border-radius: 25px; 
            border: 2px solid #ddd;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--accent);
        }
        select { 
            padding: 12px 15px; 
            border-radius: 25px; 
            border: 2px solid #ddd; 
            background: white;
            cursor: pointer;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .cart-btn {
            background: var(--success); 
            color: white; 
            border: none;
            padding: 12px 25px; 
            border-radius: 25px; 
            font-weight: bold; 
            cursor: pointer; 
            position: relative;
            transition: all 0.3s;
            font-size: 14px;
        }
        .cart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.3);
        }
        .cart-badge {
            position: absolute; 
            top: -8px; 
            right: -8px; 
            background: var(--danger);
            color: white; 
            min-width: 24px;
            height: 24px; 
            border-radius: 50%;
            font-size: 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        
        /* LOADING SPINNER */
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .products-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
            padding: 25px; 
        }
        
        /* CARD OPTIMIZADA */
        .card { 
            border: 1px solid #eee; 
            border-radius: 15px; 
            padding: 15px; 
            text-align: center; 
            transition: all 0.3s; 
            display: flex; 
            flex-direction: column;
            background: white;
        }
        .card:hover { 
            transform: translateY(-8px); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); 
            border-color: var(--accent);
        }
        
        .img-container {
            width: 100%; 
            height: 200px; 
            margin-bottom: 15px;
            display: flex; 
            align-items: center; 
            justify-content: center;
            background: #f9f9f9; 
            border-radius: 10px; 
            overflow: hidden;
            position: relative;
        }
        .img-container img { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain;
            transition: transform 0.3s;
        }
        .img-container:hover img {
            transform: scale(1.1);
        }
        .img-container .placeholder { 
            font-size: 60px; 
            color: #ddd; 
        }
 
        .brand { 
            color: var(--accent); 
            font-size: 12px; 
            font-weight: bold; 
            text-transform: uppercase; 
            margin-bottom: 5px;
        }
        .p-name { 
            font-weight: 600; 
            margin: 5px 0; 
            min-height: 45px; 
            color: var(--primary);
            font-size: 15px;
            line-height: 1.4;
        }
        .price { 
            color: var(--success); 
            font-size: 1.5em; 
            font-weight: bold; 
            margin: 10px 0; 
        }
        .btn-add { 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 12px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold;
            transition: all 0.3s;
            font-size: 14px;
        }
        .btn-add:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44, 62, 80, 0.3);
        }
 
        /* MODAL MEJORADO */
        .modal { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.8); 
            z-index: 1000; 
            justify-content: center; 
            align-items: center;
            animation: fadeIn 0.3s;
        }
        .modal.active { display: flex; }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .modal-box { 
            background: white; 
            width: 90%; 
            max-width: 550px; 
            padding: 0; 
            border-radius: 20px; 
            max-height: 90vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 2px solid #f1f1f1;
            background: #fafafa;
        }
        .modal-header h2 {
            font-size: 1.5em;
            color: var(--primary);
        }
        .close-btn {
            border: none;
            background: none;
            font-size: 28px;
            cursor: pointer;
            color: #999;
            transition: color 0.2s;
            width: 35px;
            height: 35px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .close-btn:hover {
            color: var(--danger);
        }
        
        .modal-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 25px;
        }
        
        .cart-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 1px solid #eee;
            gap: 10px;
        }
        .cart-item:last-child {
            border-bottom: none;
        }
        .cart-item-info {
            flex: 1;
            text-align: left;
        }
        .cart-item-info .brand {
            font-size: 11px;
            margin-bottom: 3px;
        }
        .cart-item-info .name {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }
        .cart-item-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        /* QUANTITY CONTROLS */
        .qty-controls {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f5f5f5;
            border-radius: 20px;
            padding: 3px;
        }
        .qty-btn {
            background: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .qty-btn:hover {
            background: var(--primary);
            color: white;
        }
        .qty-number {
            min-width: 30px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }
        
        .item-price {
            font-size: 15px;
            font-weight: bold;
            color: var(--success);
            min-width: 80px;
            text-align: right;
        }
        
        .delete-btn {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 20px;
            color: #999;
            transition: all 0.2s;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .delete-btn:hover {
            color: var(--danger);
            transform: scale(1.2);
        }
        
        .cart-total {
            text-align: right;
            font-size: 1.5em;
            font-weight: bold;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #f1f1f1;
            color: var(--primary);
        }
        .cart-total span {
            color: var(--success);
        }
        
        /* FORMULARIO DE ENVÍO */
        .shipping-form {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }
        .shipping-form h3 {
            margin-bottom: 15px;
            color: var(--primary);
            font-size: 1.1em;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 600;
            font-size: 14px;
            color: #555;
        }
        .form-group label .required {
            color: var(--danger);
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .form-group input.error {
            border-color: var(--danger);
        }
        .error-message {
            color: var(--danger);
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        
        .modal-footer {
            padding: 20px 25px;
            border-top: 2px solid #f1f1f1;
            background: #fafafa;
            display: flex;
            gap: 10px;
        }
        
        .wa-btn { 
            flex: 1;
            background: var(--whatsapp); 
            color: white; 
            border: none; 
            padding: 15px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            cursor: pointer;
            transition: all 0.3s;
            font-size: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .wa-btn:hover {
            background: #128C7E;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }
        .wa-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .clear-btn {
            background: var(--danger);
            color: white;
            border: none;
            padding: 15px 20px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .clear-btn:hover {
            background: #c0392b;
            transform: translateY(-2px);
        }
        
        .empty-cart {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty-cart-icon {
            font-size: 70px;
            margin-bottom: 15px;
        }
        
        /* TOAST NOTIFICATION */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: var(--success);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 2000;
            animation: slideInRight 0.3s, slideOutRight 0.3s 2.7s;
            display: none;
            font-weight: 500;
        }
        .toast.show {
            display: block;
        }
        @keyframes slideInRight {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(400px); opacity: 0; }
        }
        
        /* NO RESULTS */
        .no-results {
            grid-column: 1/-1;
            text-align: center;
            padding: 60px 20px;
        }
        .no-results-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        .clear-filters-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 15px;
            transition: all 0.3s;
            font-size: 14px;
        }
        .clear-filters-btn:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.3);
        }
        
        /* RESPONSIVE */
        @media (max-width: 768px) {
            body { padding: 10px; }
            header h1 { font-size: 1.5em; }
            .filters { padding: 10px; }
            .products-grid { padding: 15px; gap: 15px; }
            .modal-box { width: 95%; max-height: 95vh; }
            .modal-content { padding: 15px 20px; }
            .modal-header, .modal-footer { padding: 15px 20px; }
            .cart-item { flex-wrap: wrap; }
            .cart-item-controls { width: 100%; justify-content: space-between; margin-top: 10px; }
            .toast { right: 15px; left: 15px; bottom: 15px; }
        }
    </style>
</head>
<body>
 
<div class="container">
    <header>
        <h1>🌟 PerfumesFC 🌟</h1>
        <p>Las mejores fragancias al mejor precio</p>
    </header>
 
    <div class="filters">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Buscar perfume o marca...">
        </div>
        <select id="brandFilter">
            <option value="">Todas las marcas</option>
        </select>
        <select id="priceFilter">
            <option value="">Todos los precios</option>
            <option value="0-3000">Hasta $3.000</option>
            <option value="3000-6000">$3.000 - $6.000</option>
            <option value="6000-10000">$6.000 - $10.000</option>
            <option value="10000+">Más de $10.000</option>
        </select>
        <button class="cart-btn" onclick="openCart()">
            🛒 Mi Pedido <span class="cart-badge" id="cartCount">0</span>
        </button>
    </div>
 
    <div id="productsContainer" class="products-grid">
        <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
            <div class="spinner"></div>
            <p>⏳ Cargando catálogo...</p>
        </div>
    </div>
</div>
 
<!-- MODAL CARRITO -->
<div class="modal" id="cartModal">
    <div class="modal-box">
        <div class="modal-header">
            <h2>🛒 Mi Pedido</h2>
            <button class="close-btn" onclick="closeCart()">✕</button>
        </div>
        
        <div class="modal-content">
            <div id="cartItems"></div>
            <div class="cart-total" id="cartTotalSection" style="display:none;">
                Total: <span id="cartTotal">$0</span>
            </div>
            
            <!-- FORMULARIO DE DATOS -->
            <div class="shipping-form" id="shippingForm" style="display:none;">
                <h3>📦 Datos de envío</h3>
                <div class="form-group">
                    <label>Nombre completo <span class="required">*</span></label>
                    <input type="text" id="inputNombre" placeholder="Ej: Juan Pérez" required>
                    <span class="error-message" id="errorNombre">Por favor ingresá tu nombre</span>
                </div>
                <div class="form-group">
                    <label>Dirección <span class="required">*</span></label>
                    <input type="text" id="inputDireccion" placeholder="Ej: Av. Corrientes 1234" required>
                    <span class="error-message" id="errorDireccion">Por favor ingresá tu dirección</span>
                </div>
                <div class="form-group">
                    <label>Localidad <span class="required">*</span></label>
                    <input type="text" id="inputLocalidad" placeholder="Ej: CABA" required>
                    <span class="error-message" id="errorLocalidad">Por favor ingresá tu localidad</span>
                </div>
                <div class="form-group">
                    <label>Provincia <span class="required">*</span></label>
                    <input type="text" id="inputProvincia" placeholder="Ej: Buenos Aires" required>
                    <span class="error-message" id="errorProvincia">Por favor ingresá tu provincia</span>
                </div>
            </div>
        </div>
        
        <div class="modal-footer">
            <button class="clear-btn" onclick="clearCart()" id="clearCartBtn" style="display:none;">🗑️</button>
            <button class="wa-btn" onclick="sendOrder()" id="sendOrderBtn">
                <span>📱</span> <span>Enviar pedido por WhatsApp</span>
            </button>
        </div>
    </div>
</div>
 
<!-- TOAST NOTIFICATION -->
<div class="toast" id="toast"></div>
 
<script>
    // ============================================
    // CONFIGURACIÓN
    // ============================================
    const SHEET_ID = '1M28nZtrk1kFN-KdXTIjUFQ2AucK8cegr1weMa7J9GTk';
    const SHEET_NAME = 'Catalogo publico';
    const WHATSAPP = '541140550053';
    const STORAGE_KEY = 'perfumesFC_cart';
 
    // ============================================
    // VARIABLES GLOBALES
    // ============================================
    let allProducts = [];
    let cart = [];
 
    // ============================================
    // FUNCIÓN PRINCIPAL: CARGAR DATOS
    // ============================================
    async function loadData() {
    try {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(SHEET_NAME)}`;
        const response = await fetch(url);
        if (!response.ok) throw new Error('Error al conectar');
        const csv = await response.text();
        
        // Saltamos las primeras 3 filas de encabezado del Excel
        const rows = csv.split('\n').slice(3); 
        let lastBrand = ""; 

        allProducts = rows.map(row => {
            const col = parseCSVLine(row);
            
            // Si hay marca en Col A, la actualizamos. Si no, usamos la anterior (lastBrand)
            if (col[0] && col[0].trim() !== "" && col[0] !== '""') {
                lastBrand = col[0].replace(/"/g, '').trim();
            }

            // Si no hay nombre de perfume en Col B, saltamos la fila
            if (!col[1] || col[1].trim() === '""' || col[1].trim() === '') return null;
            
            // Limpieza de precio: Quita $, puntos de miles y cambia coma por punto decimal
            const priceRaw = col[4] ? col[4].replace(/"/g, '').trim() : "0";
            const priceNum = parseFloat(priceRaw.replace(/[$. ]/g, '').replace(',', '.')) || 0;
            
            return {
                brand: lastBrand || "Importados",
                name: col[1].replace(/"/g, '').trim(),
                priceStr: priceRaw,
                priceNum: priceNum,
                img: col[5]?.replace(/"/g, '').trim() || '' 
            };
        }).filter(p => p !== null);

        // Actualizar selector de marcas
        const brandFilter = document.getElementById('brandFilter');
        brandFilter.innerHTML = '<option value="">Todas las marcas</option>';
        const brands = [...new Set(allProducts.map(p => p.brand))].sort();
        brands.forEach(b => {
            const opt = document.createElement('option');
            opt.value = b; opt.textContent = b;
            brandFilter.appendChild(opt);
        });

        render(allProducts);
    } catch (e) {
        console.error(e);
        document.getElementById('productsContainer').innerHTML = "⚠️ Error al cargar los datos.";
    }
}
 
    // ============================================
    // PARSEAR LÍNEA CSV
    // ============================================
    function parseCSVLine(line) {
        const result = [];
        let cur = '';
        let q = false;
        for (let c of line) {
            if (c === '"') q = !q;
            else if (c === ',' && !q) { 
                result.push(cur); 
                cur = ''; 
            }
            else cur += c;
        }
        result.push(cur);
        return result;
    }
 
    // ============================================
    // NORMALIZAR TEXTO (para búsqueda sin acentos)
    // ============================================
    function normalize(str) {
        return str.toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "");
    }
 
    // ============================================
    // RENDERIZAR PRODUCTOS
    // ============================================
    function render(list) {
        const container = document.getElementById('productsContainer');
        
        if (list.length === 0) {
            container.innerHTML = `
                <div class="no-results">
                    <div class="no-results-icon">🔍</div>
                    <h3>No se encontraron productos</h3>
                    <p style="color: #999; margin-top: 10px;">Intentá con otros filtros</p>
                    <button class="clear-filters-btn" onclick="clearFilters()">Limpiar filtros</button>
                </div>
            `;
            return;
        }
        
        container.innerHTML = list.map(p => `
            <div class="card">
                <div class="img-container">
                    ${p.img 
                        ? `<img src="img/${p.img}" alt="${escapeHtml(p.name)}" loading="lazy" onerror="this.parentElement.innerHTML='<span class=\\'placeholder\\'>💎</span>'">` 
                        : `<span class="placeholder">💎</span>`
                    }
                </div>
                <div class="brand">${escapeHtml(p.brand)}</div>
                <div class="p-name">${escapeHtml(p.name)}</div>
                <div class="price">${escapeHtml(p.priceStr)}</div>
                <button class="btn-add" data-product="${encodeURIComponent(p.name)}">
                    Agregar al pedido
                </button>
            </div>
        `).join('');
        
        // Agregar event listeners a los botones
        document.querySelectorAll('.btn-add').forEach(btn => {
            btn.addEventListener('click', function() {
                const productName = decodeURIComponent(this.getAttribute('data-product'));
                addToCart(productName, this);
            });
        });
    }
 
    // ============================================
    // ESCAPAR HTML (prevenir XSS)
    // ============================================
    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
 
    // ============================================
    // AGREGAR AL CARRITO
    // ============================================
    function addToCart(name, btn) {
        const product = allProducts.find(x => x.name === name);
        if (!product) return;
        
        // Buscar si ya existe en el carrito
        const existing = cart.find(x => x.name === name);
        if (existing) {
            existing.quantity = (existing.quantity || 1) + 1;
        } else {
            cart.push({ ...product, quantity: 1 });
        }
        
        // Guardar en localStorage
        saveCart();
        
        // Actualizar contador
        updateCartCount();
        
        // Feedback visual en el botón
        const oldText = btn.textContent;
        const oldBg = btn.style.background;
        btn.textContent = "✅ ¡Agregado!";
        btn.style.background = "#27ae60";
        setTimeout(() => { 
            btn.textContent = oldText; 
            btn.style.background = oldBg; 
        }, 1000);
        
        // Mostrar toast
        showToast("✅ Producto agregado al pedido");
    }
 
    // ============================================
    // MOSTRAR TOAST NOTIFICATION
    // ============================================
    function showToast(message) {
        const toast = document.getElementById('toast');
        toast.textContent = message;
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 3000);
    }
 
    // ============================================
    // ACTUALIZAR CANTIDAD
    // ============================================
    function updateQuantity(index, delta) {
        const item = cart[index];
        item.quantity = Math.max(1, Math.min(99, (item.quantity || 1) + delta));
        saveCart();
        refreshCartView();
    }
 
    // ============================================
    // ELIMINAR DEL CARRITO
    // ============================================
    function deleteFromCart(index) {
        cart.splice(index, 1);
        saveCart();
        updateCartCount();
        refreshCartView();
        showToast("🗑️ Producto eliminado");
    }
 
    // ============================================
    // VACIAR CARRITO
    // ============================================
    function clearCart() {
        if (cart.length === 0) return;
        
        if (confirm('¿Seguro que querés vaciar todo el pedido?')) {
            cart = [];
            saveCart();
            updateCartCount();
            closeCart();
            showToast("🗑️ Pedido vaciado");
        }
    }
 
    // ============================================
    // ABRIR MODAL CARRITO
    // ============================================
    function openCart() {
        refreshCartView();
        document.getElementById('cartModal').classList.add('active');
        document.querySelector('.modal-content').scrollTop = 0;
    }
 
    // ============================================
    // REFRESCAR VISTA DEL CARRITO
    // ============================================
    function refreshCartView() {
        const list = document.getElementById('cartItems');
        const clearBtn = document.getElementById('clearCartBtn');
        const shippingForm = document.getElementById('shippingForm');
        const totalSection = document.getElementById('cartTotalSection');
        
        if (cart.length === 0) {
            list.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-cart-icon">🛒</div>
                    <h3>Tu pedido está vacío</h3>
                    <p style="margin-top: 10px;">Agregá productos para comenzar</p>
                </div>
            `;
            clearBtn.style.display = 'none';
            shippingForm.style.display = 'none';
            totalSection.style.display = 'none';
        } else {
            list.innerHTML = cart.map((item, i) => `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="brand">${escapeHtml(item.brand)}</div>
                        <div class="name">${escapeHtml(item.name)}</div>
                    </div>
                    <div class="cart-item-controls">
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="updateQuantity(${i}, -1)">−</button>
                            <span class="qty-number">${item.quantity || 1}</span>
                            <button class="qty-btn" onclick="updateQuantity(${i}, 1)">+</button>
                        </div>
                        <div class="item-price">${escapeHtml(item.priceStr)}</div>
                        <button class="delete-btn" onclick="deleteFromCart(${i})" title="Eliminar">🗑️</button>
                    </div>
                </div>
            `).join('');
            clearBtn.style.display = 'block';
            shippingForm.style.display = 'block';
            totalSection.style.display = 'block';
        }
        
        // Calcular total
        const total = cart.reduce((sum, item) => sum + (item.priceNum * (item.quantity || 1)), 0);
        document.getElementById('cartTotal').textContent = "$" + total.toLocaleString('es-AR', { minimumFractionDigits: 0 });
    }
 
    // ============================================
    // CERRAR MODAL CARRITO
    // ============================================
    function closeCart() {
        document.getElementById('cartModal').classList.remove('active');
    }
 
    // ============================================
    // VALIDAR FORMULARIO
    // ============================================
    function validateForm() {
        let isValid = true;
        
        const nombre = document.getElementById('inputNombre');
        const direccion = document.getElementById('inputDireccion');
        const localidad = document.getElementById('inputLocalidad');
        const provincia = document.getElementById('inputProvincia');
        
        // Resetear errores
        [nombre, direccion, localidad, provincia].forEach(input => {
            input.classList.remove('error');
            document.getElementById('error' + input.id.replace('input', '')).style.display = 'none';
        });
        
        // Validar nombre
        if (!nombre.value.trim()) {
            nombre.classList.add('error');
            document.getElementById('errorNombre').style.display = 'block';
            isValid = false;
        }
        
        // Validar dirección
        if (!direccion.value.trim()) {
            direccion.classList.add('error');
            document.getElementById('errorDireccion').style.display = 'block';
            isValid = false;
        }
        
        // Validar localidad
        if (!localidad.value.trim()) {
            localidad.classList.add('error');
            document.getElementById('errorLocalidad').style.display = 'block';
            isValid = false;
        }
        
        // Validar provincia
        if (!provincia.value.trim()) {
            provincia.classList.add('error');
            document.getElementById('errorProvincia').style.display = 'block';
            isValid = false;
        }
        
        return isValid;
    }
 
    // ============================================
    // ENVIAR PEDIDO
    // ============================================
    function sendOrder() {
        if (cart.length === 0) {
            showToast("⚠️ El pedido está vacío");
            return;
        }
        
        // Validar formulario
        if (!validateForm()) {
            showToast("⚠️ Por favor completá todos los campos");
            return;
        }
        
        // Obtener datos del formulario
        const nombre = document.getElementById('inputNombre').value.trim();
        const direccion = document.getElementById('inputDireccion').value.trim();
        const localidad = document.getElementById('inputLocalidad').value.trim();
        const provincia = document.getElementById('inputProvincia').value.trim();
        
        // Construir mensaje de WhatsApp
        let msg = `🛍️ *NUEVO PEDIDO - PerfumesFC*\n\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `👤 *Cliente:* ${nombre}\n`;
        msg += `📍 *Dirección:* ${direccion}\n`;
        msg += `🏙️ *Localidad:* ${localidad}\n`;
        msg += `📌 *Provincia:* ${provincia}\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        msg += `*PRODUCTOS:*\n\n`;
        
        cart.forEach((p, i) => {
            const qty = p.quantity || 1;
            const subtotal = p.priceNum * qty;
            msg += `${i+1}. *${p.brand}*\n`;
            msg += `   ${p.name}\n`;
            msg += `   💰 ${p.priceStr} × ${qty} = *$${subtotal.toLocaleString('es-AR')}*\n\n`;
        });
        
        const total = cart.reduce((sum, item) => sum + (item.priceNum * (item.quantity || 1)), 0);
        msg += `━━━━━━━━━━━━━━━━━━━━\n`;
        msg += `💵 *TOTAL: $${total.toLocaleString('es-AR')}*\n`;
        msg += `━━━━━━━━━━━━━━━━━━━━\n\n`;
        msg += `📱 Enviado desde: ${window.location.href}`;
        
        // Abrir WhatsApp
        window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
        
        // Limpiar formulario y cerrar modal
        document.getElementById('inputNombre').value = '';
        document.getElementById('inputDireccion').value = '';
        document.getElementById('inputLocalidad').value = '';
        document.getElementById('inputProvincia').value = '';
        
        showToast("📱 Redirigiendo a WhatsApp...");
    }
 
    // ============================================
    // ACTUALIZAR CONTADOR DEL CARRITO
    // ============================================
    function updateCartCount() {
        const totalItems = cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
        document.getElementById('cartCount').textContent = totalItems;
    }
 
    // ============================================
    // GUARDAR CARRITO EN LOCALSTORAGE
    // ============================================
    function saveCart() {
        try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(cart));
        } catch (e) {
            console.error('Error al guardar pedido:', e);
        }
    }
 
    // ============================================
    // CARGAR CARRITO DESDE LOCALSTORAGE
    // ============================================
    function loadCart() {
        try {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                cart = JSON.parse(saved);
                updateCartCount();
            }
        } catch (e) {
            console.error('Error al cargar pedido:', e);
            cart = [];
        }
    }
 
    // ============================================
    // FILTRAR PRODUCTOS
    // ============================================
    function filterProducts() {
        const searchVal = document.getElementById('searchInput').value;
        const brandVal = document.getElementById('brandFilter').value;
        const priceVal = document.getElementById('priceFilter').value;
        
        const filtered = allProducts.filter(p => {
            // Filtro de búsqueda
            const matchSearch = !searchVal || 
                normalize(p.name).includes(normalize(searchVal)) || 
                normalize(p.brand).includes(normalize(searchVal));
            
            // Filtro de marca
            const matchBrand = !brandVal || p.brand === brandVal;
            
            // Filtro de precio
            let matchPrice = true;
            if (priceVal) {
                if (priceVal === '0-3000') matchPrice = p.priceNum <= 3000;
                else if (priceVal === '3000-6000') matchPrice = p.priceNum > 3000 && p.priceNum <= 6000;
                else if (priceVal === '6000-10000') matchPrice = p.priceNum > 6000 && p.priceNum <= 10000;
                else if (priceVal === '10000+') matchPrice = p.priceNum > 10000;
            }
            
            return matchSearch && matchBrand && matchPrice;
        });
        
        render(filtered);
    }
 
    // ============================================
    // LIMPIAR FILTROS
    // ============================================
    function clearFilters() {
        document.getElementById('searchInput').value = '';
        document.getElementById('brandFilter').value = '';
        document.getElementById('priceFilter').value = '';
        render(allProducts);
    }
 
    // ============================================
    // EVENT LISTENERS
    // ============================================
    document.getElementById('searchInput').addEventListener('input', filterProducts);
    document.getElementById('brandFilter').addEventListener('change', filterProducts);
    document.getElementById('priceFilter').addEventListener('change', filterProducts);
 
    // Cerrar modal al hacer click fuera
    document.getElementById('cartModal').addEventListener('click', function(e) {
        if (e.target === this) {
            closeCart();
        }
    });
     // ============================================
    // INICIALIZACIÓN
    // ============================================
    loadCart();
    loadData();
</script>
</body>
</html>
